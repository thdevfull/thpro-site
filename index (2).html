<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThPro Login</title>
<style>
body{font-family:Arial;background:#0b1020;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.box{background:#111827;padding:30px;border-radius:12px;width:300px}
input{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:none}
button{width:100%;padding:10px;border:none;border-radius:8px;background:#7fe8ff;color:#000;font-weight:bold}
</style>
</head>
<body>
<div class="box">
<h2>Login ThPro</h2>
<form id="login">
<input id="email" type="email" placeholder="Email" required>
<input id="password" type="password" placeholder="Senha" required>
<button type="submit">Entrar</button>
</form>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
"https://okraunqkyyaukavloztp.supabase.co",
"sb_publishable_Ixu6vZGH-UrMhXoidtTChQ_dUxP-u0m"
)

document.getElementById("login").addEventListener("submit", async (e)=>{
e.preventDefault()

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { error } = await supabase.auth.signInWithPassword({ email, password })

if(error){
alert(error.message)
return
}

window.location.href = "painel.html"
})
</script>
</body>
</html>
